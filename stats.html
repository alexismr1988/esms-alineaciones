<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas — Liga SLI</title>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--s2:#1e1e1e;--border:#2a2a2a;
  --accent:#f5a623;--text:#e8e8e8;--muted:#888;
  --c1:#e8395a;--c2:#f5a623;--c3:#ff6b35;--c4:#3498db;
  --c5:#2ecc71;--c6:#9b59b6;--c7:#ffd700;--c8:#1abc9c;
  --c9:#e74c3c;--c10:#e67e22;--c11:#00d2ff;--c12:#a29bfe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",sans-serif;min-height:100vh;}

header{
  background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);letter-spacing:2px;}
nav a{color:var(--muted);text-decoration:none;font-size:1.4rem;margin-left:1rem;transition:color .2s;}
nav a:hover{color:var(--accent);}

/* ─── TOP LOADING BAR ─── */
#loadbar{
  height:3px;background:var(--border);
  transition:width .4s;width:0%;
  position:fixed;top:56px;left:0;z-index:99;
}

/* ─── CATEGORY SELECTOR ─── */
.selector-wrap{padding:2rem 1.5rem 1rem;}
.selector-title{
  font-size:1.4rem;font-weight:700;color:var(--accent);
  margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem;
}
.cats{display:flex;flex-wrap:wrap;gap:.9rem;}

.cat-btn{
  display:flex;align-items:center;gap:.7rem;
  padding:.75rem 1.2rem;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .2s;
  text-align:left;color:var(--text);
}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.4);}
.cat-btn.active{border-width:2px;}
.cat-btn .icon{font-size:1.6rem;line-height:1;}
.cat-btn .info{display:flex;flex-direction:column;}
.cat-btn .info strong{font-size:.9rem;font-weight:700;}
.cat-btn .info span{font-size:.75rem;color:var(--muted);margin-top:.15rem;}

/* ─── TABLE SECTION ─── */
#table-section{padding:0 1.5rem 3rem;display:none;}

.tbl-header{
  display:flex;align-items:center;gap:.8rem;
  padding:1.5rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;
}
.tbl-header .tbl-icon{font-size:2rem;}
.tbl-header h2{font-size:1.4rem;font-weight:800;}

table{width:100%;border-collapse:collapse;font-size:.9rem;}
thead tr{background:var(--s2);border-bottom:2px solid var(--border);}
th{
  padding:.6rem 1.1rem;text-align:left;
  font-size:.75rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;
}
th.r,td.r{text-align:right;}

tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:var(--s2);}
td{padding:.6rem 1.1rem;vertical-align:middle;}

/* posición */
.pos{
  width:32px;height:32px;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;font-weight:800;font-size:.85rem;
  flex-shrink:0;
}
.pos-1{background:var(--c7);color:#000;}
.pos-2{background:#c0c0c0;color:#000;}
.pos-3{background:#cd7f32;color:#fff;}
.pos-n{background:var(--s2);color:var(--muted);border:1px solid var(--border);}

/* nombre + equipo */
.player-name{font-weight:600;display:block;}
.team-chip{
  display:inline-block;font-size:.72rem;padding:.1rem .4rem;
  border-radius:4px;margin-top:.2rem;font-weight:600;
  border:1px solid currentColor;opacity:.7;
}

/* barra de valor */
.bar-cell{min-width:120px;}
.bar-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.bar-fill{height:6px;border-radius:4px;}

/* valor principal */
.main-val{font-size:1.25rem;font-weight:800;}

/* highlight top3 rows */
tbody tr.top1{background:linear-gradient(90deg,rgba(255,215,0,.06),transparent);}
tbody tr.top2{background:linear-gradient(90deg,rgba(192,192,192,.05),transparent);}
tbody tr.top3{background:linear-gradient(90deg,rgba(205,127,50,.05),transparent);}

@media(max-width:600px){
  .cats{gap:.6rem;}
  .cat-btn{padding:.6rem .9rem;}
  table{font-size:.82rem;}
  .main-val{font-size:1rem;}
  .bar-cell{display:none;}
}
</style>
</head>
<body>

<div id="loadbar"></div>

<header>
  <span class="logo">Liga SLI</span>
  <nav>
    <a href="main.html" title="Inicio">🏠</a>
    <a href="index.html" title="Alineaciones">📋</a>
  </nav>
</header>

<div class="selector-wrap">
  <div class="selector-title">📊 Elige una estadística</div>
  <div class="cats" id="cats"></div>
</div>

<div id="table-section">
  <div class="tbl-header">
    <span class="tbl-icon" id="tbl-icon"></span>
    <h2 id="tbl-title"></h2>
  </div>
  <div id="tbl-wrap"></div>
</div>

<script>
const BASE = "https://cdn.jsdelivr.net/gh/alexismr1988/esms-alineaciones@main/rosters/";
const TEAMS = ['ars','atm','bar','bay','bor','che','cit','int','liv','man','nap','psg','rma','tot'];
const LABEL = {
  ars:'Arsenal',atm:'Atlético',bar:'Barça',bay:'Bayern',bor:'Dortmund',
  che:'Chelsea',cit:'Man City',int:'Inter',liv:'Liverpool',man:'Man Utd',
  nap:'Nápoles',psg:'PSG',rma:'Real Madrid',tot:'Tottenham'
};

const CATS = [
  {id:'gls',  icon:'⚽', label:'Goleadores',          desc:'Más goles marcados',          color:'var(--c1)'},
  {id:'ass',  icon:'🎯', label:'Asistencias',          desc:'Más asistencias',             color:'var(--c2)'},
  {id:'sht',  icon:'🔫', label:'Disparos',             desc:'Más disparos a puerta',       color:'var(--c3)'},
  {id:'sav',  icon:'🧤', label:'Paradas',              desc:'Porteros con más paradas',    color:'var(--c4)', gkOnly:true},
  {id:'ktk',  icon:'🛡️', label:'Cortes',               desc:'Cortes defensivos',           color:'var(--c5)'},
  {id:'kps',  icon:'🔵', label:'Pases',                desc:'Pases completados',           color:'var(--c6)'},
  {id:'mom',  icon:'⭐', label:'MVP',                  desc:'Veces jugador del partido',   color:'var(--c7)'},
  {id:'min',  icon:'⏱️', label:'Minutos',              desc:'Minutos jugados',             color:'var(--c8)'},
  {id:'con',  icon:'🚨', label:'Goles encajados',      desc:'Porteros con menos GC',       color:'var(--c9)', gkOnly:true, asc:true},
  {id:'mpg',  icon:'⚡', label:'Min por gol',          desc:'Menos minutos por gol',       color:'var(--c10)', ratio:true, asc:true},
  {id:'conv', icon:'🏹', label:'% Conversión',         desc:'Goles / Disparos × 100',      color:'var(--c11)', ratio:true},
  {id:'gc90', icon:'🏆', label:'Portero GC/90',        desc:'Goles encajados por 90 min',  color:'var(--c12)', gkOnly:true, ratio:true, asc:true},
];

let allPlayers = null;
let activeId = null;

// ─── PARSE ───────────────────────────────────────────────────────────────────
function parseRoster(text, team){
  const out = [];
  for(const raw of text.split(/?
/)){
    const line = raw.trim();
    if(!line || line.startsWith('Name') || line.startsWith('---')) continue;
    const p = line.split(/\s+/);
    if(p.length < 10) continue;
    let ai = -1;
    for(let i=1;i<p.length;i++){ if(/^\d+$/.test(p[i])){ ai=i; break; } }
    if(ai<0) continue;
    const name = p.slice(0,ai).join(' ');
    if(!name) continue;
    const n = p.length;
    out.push({ name, team,
      st:  parseInt(p[ai+2])||0,
      gam: parseInt(p[n-15])||0,
      min: parseInt(p[n-13])||0,
      mom: parseInt(p[n-12])||0,
      sav: parseInt(p[n-11])||0,
      con: parseInt(p[n-10])||0,
      ktk: parseInt(p[n-9]) ||0,
      kps: parseInt(p[n-8]) ||0,
      sht: parseInt(p[n-7]) ||0,
      gls: parseInt(p[n-6]) ||0,
      ass: parseInt(p[n-5]) ||0,
    });
  }
  return out;
}

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData(){
  const bar = document.getElementById('loadbar');
  let done = 0;
  const results = await Promise.all(TEAMS.map(t =>
    fetch(BASE + t + '.txt?v=' + Date.now())
      .then(r => r.ok ? r.text() : '')
      .then(txt => {
        done++;
        bar.style.width = (done/TEAMS.length*100) + '%';
        bar.style.background = 'var(--accent)';
        return parseRoster(txt, t);
      })
      .catch(() => [])
  ));
  allPlayers = results.flat();
  bar.style.background = 'var(--c5)';
  setTimeout(()=>{ bar.style.opacity='0'; }, 800);
  if(activeId) renderTable(activeId);
}

// ─── GET RANKED PLAYERS ───────────────────────────────────────────────────────
function getRanked(cat){
  let arr = allPlayers;
  if(cat.gkOnly) arr = arr.filter(p=>p.st>=25);

  let scored;
  if(cat.id==='mpg'){
    scored = arr.filter(p=>p.gls>0&&p.min>0).map(p=>({...p, _v: +(p.min/p.gls).toFixed(1)}));
  } else if(cat.id==='conv'){
    scored = arr.filter(p=>p.sht>0&&p.gls>0).map(p=>({...p, _v: +(p.gls/p.sht*100).toFixed(1)}));
  } else if(cat.id==='gc90'){
    scored = arr.filter(p=>p.min>=45).map(p=>({...p, _v: +(p.con/p.min*90).toFixed(2)}));
  } else {
    scored = arr.filter(p=>p[cat.id]>0).map(p=>({...p, _v: p[cat.id]}));
  }

  scored.sort((a,b) => cat.asc ? a._v - b._v : b._v - a._v);
  return scored.slice(0,15);
}

// ─── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderTable(id){
  const cat = CATS.find(c=>c.id===id);
  if(!cat) return;

  document.getElementById('tbl-icon').textContent  = cat.icon;
  document.getElementById('tbl-title').textContent = cat.label;
  document.getElementById('tbl-title').style.color = cat.color;

  const section = document.getElementById('table-section');
  section.style.display = 'block';
  section.style.setProperty('--cat-color', cat.color);

  const wrap = document.getElementById('tbl-wrap');

  if(!allPlayers){
    wrap.innerHTML = '<p style="color:var(--muted);padding:2rem">Cargando datos…</p>';
    return;
  }

  const players = getRanked(cat);
  if(!players.length){
    wrap.innerHTML = '<p style="color:var(--muted);padding:2rem">Sin datos disponibles aún.</p>';
    return;
  }

  const maxV = Math.max(...players.map(p=>p._v), 1);

  // Columnas extra según categoría
  let extraHead = '', extraCell = p => '';
  if(cat.id==='gls'||cat.id==='mpg')   { extraHead='<th>PJ</th><th>Min</th>'; extraCell=p=>`<td>${p.gam}</td><td>${p.min}</td>`; }
  else if(cat.id==='sht'||cat.id==='conv'){ extraHead='<th>Goles</th><th>Disp.</th>'; extraCell=p=>`<td>${p.gls}</td><td>${p.sht}</td>`; }
  else if(cat.id==='sav'||cat.id==='con'||cat.id==='gc90'){ extraHead='<th>Min</th><th>GC</th>'; extraCell=p=>`<td>${p.min}</td><td>${p.con}</td>`; }
  else { extraHead='<th>PJ</th>'; extraCell=p=>`<td>${p.gam}</td>`; }

  const suffix = cat.id==='conv' ? '%' : cat.id==='gc90' ? '' : '';

  const rows = players.map((p,i) => {
    const posClass = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'pos-n';
    const rowClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const barW = Math.round(p._v / maxV * 100);
    const displayV = cat.id==='conv' ? p._v + '%' : p._v;

    return `<tr class="${rowClass}">
      <td><div class="pos ${posClass}">${i+1}</div></td>
      <td>
        <span class="player-name">${p.name}</span>
        <span class="team-chip" style="color:${cat.color}">${LABEL[p.team]||p.team}</span>
      </td>
      ${extraCell(p)}
      <td class="bar-cell">
        <div class="bar-bg">
          <div class="bar-fill" style="width:${barW}%;background:${cat.color}"></div>
        </div>
      </td>
      <td class="r"><span class="main-val" style="color:${cat.color}">${displayV}</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th style="width:44px">#</th>
      <th>Jugador</th>
      ${extraHead}
      <th class="bar-cell">Progresión</th>
      <th class="r">${cat.label}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ─── BUILD CATEGORY BUTTONS ───────────────────────────────────────────────────
function buildCats(){
  const container = document.getElementById('cats');
  container.innerHTML = CATS.map(c => `
    <button class="cat-btn" id="btn-${c.id}" onclick="selectCat('${c.id}')"
      style="--cc:${c.color}">
      <span class="icon">${c.icon}</span>
      <span class="info">
        <strong style="color:${c.color}">${c.label}</strong>
        <span>${c.desc}</span>
      </span>
    </button>`).join('');
}

function selectCat(id){
  if(activeId){
    const old = document.getElementById('btn-'+activeId);
    if(old){ old.classList.remove('active'); old.style.borderColor=''; old.style.boxShadow=''; }
  }
  activeId = id;
  const btn = document.getElementById('btn-'+id);
  const cat = CATS.find(c=>c.id===id);
  btn.classList.add('active');
  btn.style.borderColor = cat.color;
  btn.style.boxShadow = `0 0 14px ${cat.color}44`;
  renderTable(id);
}

buildCats();
loadData();
</script>
</body>
</html>
