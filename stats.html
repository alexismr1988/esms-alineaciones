<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadisticas - Liga SLI</title>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--s2:#1e1e1e;--border:#2a2a2a;
  --accent:#f5a623;--text:#e8e8e8;--muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",sans-serif;min-height:100vh;}
header{
  background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);letter-spacing:2px;}
nav a{color:var(--muted);text-decoration:none;font-size:1.4rem;margin-left:1rem;transition:color .2s;}
nav a:hover{color:var(--accent);}
#loadbar{height:3px;background:var(--accent);width:0%;transition:width .3s;position:fixed;top:56px;left:0;z-index:99;}
.selector-wrap{padding:2rem 1.5rem 1rem;}
.selector-title{font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:1.5rem;}
.cats{display:flex;flex-wrap:wrap;gap:.8rem;}
.cat-btn{
  display:flex;align-items:center;gap:.7rem;padding:.75rem 1.2rem;
  border-radius:10px;border:1px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .2s;color:var(--text);min-width:180px;
}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.5);}
.cat-btn.active{border-width:2px;}
.cat-icon{font-size:1.5rem;line-height:1;}
.cat-label{font-size:.88rem;font-weight:700;display:block;}
.cat-desc{font-size:.73rem;color:var(--muted);display:block;margin-top:.15rem;}
#table-section{padding:0 1.5rem 3rem;display:none;}
.tbl-header{display:flex;align-items:center;gap:.8rem;padding:1.5rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.tbl-icon{font-size:2rem;}
.tbl-h2{font-size:1.4rem;font-weight:800;}
table{width:100%;border-collapse:collapse;font-size:.9rem;}
thead tr{background:var(--s2);border-bottom:2px solid var(--border);}
th{padding:.6rem 1.1rem;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;}
th.r,td.r{text-align:right;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:var(--s2);}
td{padding:.6rem 1.1rem;vertical-align:middle;}
.pos{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.pos1{background:#ffd700;color:#000;}
.pos2{background:#c0c0c0;color:#000;}
.pos3{background:#cd7f32;color:#fff;}
.posn{background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.pname{font-weight:600;display:block;}
.chip{display:inline-block;font-size:.72rem;padding:.1rem .4rem;border-radius:4px;margin-top:.2rem;font-weight:600;border:1px solid;opacity:.8;}
.bar-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.bar-fill{height:6px;border-radius:4px;}
.main-val{font-size:1.25rem;font-weight:800;}
.top1{background:linear-gradient(90deg,rgba(255,215,0,.07),transparent);}
.top2{background:linear-gradient(90deg,rgba(192,192,192,.05),transparent);}
.top3{background:linear-gradient(90deg,rgba(205,127,50,.05),transparent);}
/* listado sin ranking */
.list-val{font-size:1.1rem;font-weight:800;}
.badge-pts{
  display:inline-block;padding:.2rem .7rem;border-radius:20px;
  font-size:.82rem;font-weight:700;border:1px solid;margin-left:.5rem;
}
@media(max-width:600px){.cats{gap:.5rem;}.cat-btn{min-width:140px;}.main-val{font-size:1rem;}}
</style>
</head>
<body>
<div id="loadbar"></div>
<header>
  <span class="logo">Liga SLI</span>
  <nav>
    <a href="main.html">&#127968;</a>
    <a href="index.html">&#128203;</a>
  </nav>
</header>
<div class="selector-wrap">
  <div class="selector-title">&#128202; Elige una estadistica</div>
  <div class="cats" id="cats"></div>
</div>
<div id="table-section">
  <div class="tbl-header">
    <span class="tbl-icon" id="tbl-icon"></span>
    <span class="tbl-h2" id="tbl-title"></span>
  </div>
  <div id="tbl-wrap"></div>
</div>
<script>
var BASE = "https://cdn.jsdelivr.net/gh/alexismr1988/esms-alineaciones@main/rosters/";
var TEAMS = ['ars','atm','bar','bay','bor','che','cit','int','liv','man','nap','psg','rma','tot'];
var LABEL = {ars:'Arsenal',atm:'Atletico',bar:'Barca',bay:'Bayern',bor:'Dortmund',che:'Chelsea',cit:'Man City',int:'Inter',liv:'Liverpool',man:'Man Utd',nap:'Napoles',psg:'PSG',rma:'Real Madrid',tot:'Tottenham'};

var CATS = [
  {id:'gls',  icon:'&#9917;',  label:'Goleadores',       desc:'Mas goles marcados',                color:'#e8395a'},
  {id:'ass',  icon:'&#127919;',label:'Asistencias',       desc:'Mas asistencias',                   color:'#f5a623'},
  {id:'sht',  icon:'&#128308;',label:'Disparos',          desc:'Mas disparos a puerta',             color:'#ff6b35'},
  {id:'sav',  icon:'&#129354;',label:'Paradas',           desc:'Porteros con mas paradas',          color:'#3498db', gk:true},
  {id:'ktk',  icon:'&#128737;',label:'Cortes',            desc:'Cortes defensivos',                 color:'#2ecc71'},
  {id:'kps',  icon:'&#128309;',label:'Pases',             desc:'Pases completados',                 color:'#9b59b6'},
  {id:'mom',  icon:'&#11088;', label:'MVP',               desc:'Veces jugador del partido',         color:'#ffd700'},
  {id:'min',  icon:'&#9201;',  label:'Minutos',           desc:'Minutos jugados',                   color:'#1abc9c'},
  {id:'con',  icon:'&#128680;',label:'Goles encajados',   desc:'Porteros con menos GC',             color:'#e74c3c', gk:true, asc:true},
  {id:'mpg',  icon:'&#9889;',  label:'Min por gol',       desc:'Menos minutos por gol',             color:'#e67e22', ratio:true, asc:true},
  {id:'conv', icon:'&#127993;',label:'% Conversion',      desc:'Goles / Disparos x 100',            color:'#00d2ff', ratio:true},
  {id:'gc90', icon:'&#127942;',label:'Portero GC/90',     desc:'Goles encajados por 90 min',        color:'#a29bfe', gk:true, ratio:true, asc:true},
  {id:'sus',  icon:'&#128308;',label:'Sancionados',       desc:'Partidos de sancion pendientes',    color:'#e74c3c', list:true},
  {id:'inj',  icon:'&#129657;',label:'Lesionados',        desc:'Partidos de baja por lesion',       color:'#e67e22', list:true}
];

var allPlayers = null;
var activeId = null;

function parseRoster(text, team){
  var out = [];
  var lines = text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line = lines[i].trim();
    if(!line || line.indexOf('Name')===0 || line.indexOf('---')===0) continue;
    var p = line.split(/\s+/);
    if(p.length < 10) continue;
    var ai = -1;
    for(var j=1;j<p.length;j++){ if(/^\d+$/.test(p[j])){ ai=j; break; } }
    if(ai<0) continue;
    var name = p.slice(0,ai).join(' ');
    if(!name) continue;
    var n = p.length;
    out.push({name:name, team:team,
      st:  parseInt(p[ai+2])||0,
      gam: parseInt(p[n-15])||0,
      min: parseInt(p[n-13])||0,
      mom: parseInt(p[n-12])||0,
      sav: parseInt(p[n-11])||0,
      con: parseInt(p[n-10])||0,
      ktk: parseInt(p[n-9]) ||0,
      kps: parseInt(p[n-8]) ||0,
      sht: parseInt(p[n-7]) ||0,
      gls: parseInt(p[n-6]) ||0,
      ass: parseInt(p[n-5]) ||0,
      inj: parseInt(p[n-3]) ||0,
      sus: parseInt(p[n-2]) ||0
    });
  }
  return out;
}

function loadData(){
  var bar = document.getElementById('loadbar');
  var done = 0;
  var promises = TEAMS.map(function(t){
    return fetch(BASE + t + '.txt')
      .then(function(r){ return r.ok ? r.text() : ''; })
      .then(function(txt){
        done++;
        bar.style.width = (done/TEAMS.length*100) + '%';
        return parseRoster(txt, t);
      })
      .catch(function(){ return []; });
  });
  Promise.all(promises).then(function(results){
    allPlayers = [];
    for(var i=0;i<results.length;i++) allPlayers = allPlayers.concat(results[i]);
    bar.style.background = '#2ecc71';
    setTimeout(function(){ bar.style.opacity='0'; }, 800);
    if(activeId) renderTable(activeId);
  });
}

function getRanked(cat){
  var arr = cat.gk ? allPlayers.filter(function(p){ return p.st>=25; }) : allPlayers;
  var scored;
  if(cat.list){
    var key = cat.id;
    return arr.filter(function(p){ return p[key]>0; })
              .sort(function(a,b){ return b[key]-a[key]; });
  }
  if(cat.id==='mpg'){
    scored = arr.filter(function(p){ return p.gls>0 && p.min>0; })
               .map(function(p){ return Object.assign({},p,{_v: Math.round(p.min/p.gls*10)/10}); });
  } else if(cat.id==='conv'){
    scored = arr.filter(function(p){ return p.sht>0 && p.gls>0; })
               .map(function(p){ return Object.assign({},p,{_v: Math.round(p.gls/p.sht*1000)/10}); });
  } else if(cat.id==='gc90'){
    scored = arr.filter(function(p){ return p.min>=45; })
               .map(function(p){ return Object.assign({},p,{_v: Math.round(p.con/p.min*9000)/100}); });
  } else {
    scored = arr.filter(function(p){ return p[cat.id]>0; })
               .map(function(p){ return Object.assign({},p,{_v: p[cat.id]}); });
  }
  scored.sort(function(a,b){ return cat.asc ? a._v-b._v : b._v-a._v; });
  return scored;
}

function renderTable(id){
  var cat = null;
  for(var i=0;i<CATS.length;i++){ if(CATS[i].id===id){ cat=CATS[i]; break; } }
  if(!cat) return;
  document.getElementById('tbl-icon').innerHTML = cat.icon;
  var h2 = document.getElementById('tbl-title');
  h2.textContent = cat.label;
  h2.style.color = cat.color;
  var section = document.getElementById('table-section');
  section.style.display = 'block';
  var wrap = document.getElementById('tbl-wrap');
  if(!allPlayers){
    wrap.innerHTML = '<p style="color:#888;padding:2rem">Cargando datos...</p>';
    return;
  }
  var players = getRanked(cat);
  if(!players.length){
    wrap.innerHTML = '<p style="color:#888;padding:2rem">No hay jugadores con esta estadistica aun.</p>';
    return;
  }

  // ── LISTADO SIN RANKING (sancionados / lesionados) ──
  if(cat.list){
    var key = cat.id;
    var colLabel = key==='sus' ? 'Partidos sancion' : 'Partidos lesion';
    var rows = '';
    for(var i=0;i<players.length;i++){
      var p = players[i];
      var val = p[key];
      var teamName = LABEL[p.team]||p.team;
      rows += '<tr>'
        +'<td class="left">'
        +'<span class="pname">'+p.name+'</span>'
        +'<span class="chip" style="color:'+cat.color+';border-color:'+cat.color+'">'+teamName+'</span>'
        +'</td>'
        +'<td class="r">'
        +'<span class="list-val" style="color:'+cat.color+'">'+val+'</span>'
        +'<span class="badge-pts" style="color:'+cat.color+';border-color:'+cat.color+'88">'
        +(val===1?'1 partido':val+' partidos')
        +'</span>'
        +'</td>'
        +'</tr>';
    }
    wrap.innerHTML = '<table><thead><tr>'
      +'<th class="left">Jugador</th>'
      +'<th class="r">'+colLabel+'</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table>';
    section.scrollIntoView({behavior:'smooth', block:'nearest'});
    return;
  }

  // ── RANKING NORMAL ──
  var maxV = 0;
  for(var i=0;i<players.length;i++) if(players[i]._v > maxV) maxV = players[i]._v;
  if(maxV===0) maxV=1;

  var extraHead='', extraCells=[];
  if(cat.id==='gls'||cat.id==='mpg'){
    extraHead='<th>PJ</th><th>Min</th>';
    for(var i=0;i<players.length;i++) extraCells.push('<td>'+players[i].gam+'</td><td>'+players[i].min+'</td>');
  } else if(cat.id==='sht'||cat.id==='conv'){
    extraHead='<th>Goles</th><th>Disp</th>';
    for(var i=0;i<players.length;i++) extraCells.push('<td>'+players[i].gls+'</td><td>'+players[i].sht+'</td>');
  } else if(cat.id==='sav'||cat.id==='con'||cat.id==='gc90'){
    extraHead='<th>Min</th><th>GC</th>';
    for(var i=0;i<players.length;i++) extraCells.push('<td>'+players[i].min+'</td><td>'+players[i].con+'</td>');
  } else {
    extraHead='<th>PJ</th>';
    for(var i=0;i<players.length;i++) extraCells.push('<td>'+players[i].gam+'</td>');
  }

  var rows='';
  for(var i=0;i<players.length;i++){
    var p=players[i];
    var posClass = i===0?'pos1':i===1?'pos2':i===2?'pos3':'posn';
    var rowClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    var barW = Math.round(p._v/maxV*100);
    var displayV = cat.id==='conv' ? p._v+'%' : p._v;
    var teamName = LABEL[p.team]||p.team;
    rows += '<tr class="'+rowClass+'">'
      +'<td><div class="pos '+posClass+'">'+(i+1)+'</div></td>'
      +'<td><span class="pname">'+p.name+'</span>'
      +'<span class="chip" style="color:'+cat.color+';border-color:'+cat.color+'">'+teamName+'</span></td>'
      +extraCells[i]
      +'<td><div class="bar-bg"><div class="bar-fill" style="width:'+barW+'%;background:'+cat.color+'"></div></div></td>'
      +'<td class="r"><span class="main-val" style="color:'+cat.color+'">'+displayV+'</span></td>'
      +'</tr>';
  }

  wrap.innerHTML = '<table><thead><tr>'
    +'<th style="width:44px">#</th><th>Jugador</th>'
    +extraHead
    +'<th>Progresion</th><th class="r">'+cat.label+'</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';

  section.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function selectCat(id){
  if(activeId){
    var old = document.getElementById('btn-'+activeId);
    if(old){ old.classList.remove('active'); old.style.borderColor=''; old.style.boxShadow=''; }
  }
  activeId = id;
  var cat = null;
  for(var i=0;i<CATS.length;i++){ if(CATS[i].id===id){ cat=CATS[i]; break; } }
  var btn = document.getElementById('btn-'+id);
  btn.classList.add('active');
  btn.style.borderColor = cat.color;
  btn.style.boxShadow = '0 0 14px '+cat.color+'66';
  renderTable(id);
}

function buildCats(){
  var container = document.getElementById('cats');
  var html = '';
  for(var i=0;i<CATS.length;i++){
    var c = CATS[i];
    html += '<button class="cat-btn" id="btn-'+c.id+'" data-id="'+c.id+'" style="border-color:'+c.color+'22">'
      +'<span class="cat-icon">'+c.icon+'</span>'
      +'<span><strong class="cat-label" style="color:'+c.color+'">'+c.label+'</strong>'
      +'<span class="cat-desc">'+c.desc+'</span></span>'
      +'</button>';
  }
  container.innerHTML = html;
  var btns = container.querySelectorAll('.cat-btn');
  for(var i=0;i<btns.length;i++){
    btns[i].addEventListener('click', function(){
      selectCat(this.getAttribute('data-id'));
    });
  }
}

buildCats();
loadData();
</script>
</body>
</html>
