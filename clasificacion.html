<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificacion - Liga SLI</title>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--s2:#1e1e1e;--border:#2a2a2a;
  --accent:#f5a623;--text:#e8e8e8;--muted:#888;
  --win:#2ecc71;--draw:#3498db;--loss:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",sans-serif;min-height:100vh;}
header{
  background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);letter-spacing:2px;}
nav a{color:var(--muted);text-decoration:none;font-size:1.4rem;margin-left:1rem;transition:color .2s;}
nav a:hover{color:var(--accent);}
.page-title{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;}
.page-title h1{font-size:1.5rem;font-weight:800;color:var(--accent);}
#loading{text-align:center;padding:4rem;color:var(--muted);}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.table-wrap{padding:1.5rem;max-width:900px;margin:0 auto;}
table{width:100%;border-collapse:collapse;font-size:.9rem;}
thead tr{background:var(--s2);border-bottom:2px solid var(--border);}
th{padding:.7rem 1rem;text-align:center;font-size:.73rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;}
th.left,td.left{text-align:left;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{filter:brightness(1.15);}
td{padding:.65rem 1rem;text-align:center;vertical-align:middle;}

/* bola de posicion */
.pos-num{
  width:30px;height:30px;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;font-weight:800;font-size:.85rem;
  border:2px solid;
}

/* colores de zona como borde izquierdo de fila */
tbody tr.z-green { border-left: 3px solid #2ecc71; }
tbody tr.z-yellow{ border-left: 3px solid #f1c40f; }
tbody tr.z-blue  { border-left: 3px solid #3498db; }
tbody tr.z-red   { border-left: 3px solid #e74c3c; }
tbody tr.z-darkred{ border-left: 3px solid #8e0000; }

/* colores bola segun zona */
.c-green  { background:#2ecc7122; color:#2ecc71; border-color:#2ecc71; }
.c-yellow { background:#f1c40f22; color:#f1c40f; border-color:#f1c40f; }
.c-blue   { background:#3498db22; color:#3498db; border-color:#3498db; }
.c-red    { background:#e74c3c22; color:#e74c3c; border-color:#e74c3c; }
.c-darkred{ background:#8e000022; color:#c0392b; border-color:#8e0000; }

.team-name{font-weight:700;font-size:.95rem;}
.pts-cell{font-size:1.2rem;font-weight:800;color:var(--accent);}
.gd-pos{color:#2ecc71;}
.gd-neg{color:#e74c3c;}
.gd-zero{color:var(--muted);}
.f-w{display:inline-flex;width:20px;height:20px;border-radius:3px;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;background:#2ecc71;color:#fff;}
.f-d{display:inline-flex;width:20px;height:20px;border-radius:3px;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;background:#3498db;color:#fff;}
.f-l{display:inline-flex;width:20px;height:20px;border-radius:3px;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;background:#e74c3c;color:#fff;}
tbody tr.sep-bottom td{border-bottom:2px solid #333;}
@media(max-width:640px){.hide-sm{display:none;}td,th{padding:.5rem .5rem;}.team-name{font-size:.85rem;}}
</style>
</head>
<body>
<header>
  <span class="logo">Liga SLI</span>
  <nav>
    <a href="main.html" title="Inicio">&#127968;</a>
    <a href="stats.html" title="Estadisticas">&#128202;</a>
    <a href="index.html" title="Alineaciones">&#128203;</a>
  </nav>
</header>
<div class="page-title">
  <h1>&#127942; Clasificacion</h1>
</div>
<div id="loading">
  <div class="spinner"></div>
  Cargando clasificacion...
</div>
<div class="table-wrap" id="table-wrap" style="display:none"></div>

<script>
var BASE = "https://cdn.jsdelivr.net/gh/alexismr1988/esms-alineaciones@main/clasificacion/table.txt";

function parseTable(text){
  var rows = [];
  var lines = text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line = lines[i].trim();
    if(!line || line.indexOf('Pl')===0 || line.indexOf('-')===0) continue;
    var parts = line.split(/\s{2,}/);
    if(parts.length < 9) continue;
    rows.push({
      pl:  parseInt(parts[0])||0,
      team: parts[1].trim(),
      p:   parseInt(parts[2])||0,
      w:   parseInt(parts[3])||0,
      d:   parseInt(parts[4])||0,
      l:   parseInt(parts[5])||0,
      gf:  parseInt(parts[6])||0,
      ga:  parseInt(parts[7])||0,
      gd:  parseInt(parts[8])||0,
      pts: parseInt(parts[9])||0
    });
  }
  return rows;
}

function getZone(pl, total){
  if(pl === 1)           return {row:'z-green',  ball:'c-green'};
  if(pl <= 4)            return {row:'z-yellow', ball:'c-yellow'};
  if(pl <= total - 4)    return {row:'z-blue',   ball:'c-blue'};
  if(pl < total)         return {row:'z-red',    ball:'c-red'};
  return                        {row:'z-darkred',ball:'c-darkred'};
}

function gdHtml(v){
  if(v>0) return '<span class="gd-pos">+'+v+'</span>';
  if(v<0) return '<span class="gd-neg">'+v+'</span>';
  return '<span class="gd-zero">0</span>';
}

function formaHtml(t){
  var html = '<div style="display:flex;gap:3px;justify-content:center">';
  for(var i=0;i<t.w;i++) html += '<span class="f-w">V</span>';
  for(var i=0;i<t.d;i++) html += '<span class="f-d">E</span>';
  for(var i=0;i<t.l;i++) html += '<span class="f-l">D</span>';
  return html + '</div>';
}

function buildTable(rows){
  var total = rows.length;
  var html = '<table><thead><tr>'
    +'<th style="width:44px">#</th>'
    +'<th class="left">Equipo</th>'
    +'<th title="Partidos jugados">PJ</th>'
    +'<th title="Victorias" class="hide-sm" style="color:#2ecc71">V</th>'
    +'<th title="Empates" class="hide-sm" style="color:#3498db">E</th>'
    +'<th title="Derrotas" class="hide-sm" style="color:#e74c3c">D</th>'
    +'<th title="Goles a favor">GF</th>'
    +'<th title="Goles en contra">GC</th>'
    +'<th title="Diferencia de goles">DG</th>'
    +'<th class="hide-sm">Forma</th>'
    +'<th>Pts</th>'
    +'</tr></thead><tbody>';

  for(var i=0;i<rows.length;i++){
    var t = rows[i];
    var z = getZone(t.pl, total);
    // linea separadora tras pos 1 y pos 4
    var sepClass = (t.pl===1||t.pl===4) ? 'sep-bottom' : '';

    html += '<tr class="'+z.row+' '+sepClass+'">'
      +'<td><div class="pos-num '+z.ball+'">'+t.pl+'</div></td>'
      +'<td class="left"><span class="team-name">'+t.team+'</span></td>'
      +'<td>'+t.p+'</td>'
      +'<td class="hide-sm" style="color:#2ecc71;font-weight:700">'+t.w+'</td>'
      +'<td class="hide-sm" style="color:#3498db;font-weight:700">'+t.d+'</td>'
      +'<td class="hide-sm" style="color:#e74c3c;font-weight:700">'+t.l+'</td>'
      +'<td>'+t.gf+'</td>'
      +'<td>'+t.ga+'</td>'
      +'<td>'+gdHtml(t.gd)+'</td>'
      +'<td class="hide-sm">'+formaHtml(t)+'</td>'
      +'<td><span class="pts-cell">'+t.pts+'</span></td>'
      +'</tr>';
  }

  html += '</tbody></table>';
  return html;
}

fetch(BASE + '?v=' + Date.now())
  .then(function(r){ return r.ok ? r.text() : Promise.reject(r.status); })
  .then(function(text){
    var rows = parseTable(text);
    document.getElementById('loading').style.display = 'none';
    var wrap = document.getElementById('table-wrap');
    wrap.style.display = 'block';
    wrap.innerHTML = buildTable(rows);
  })
  .catch(function(err){
    document.getElementById('loading').innerHTML =
      '<p style="color:#e74c3c;padding:2rem">Error al cargar ('+err+'). Comprueba que existe clasificacion/table.txt en el repositorio.</p>';
  });
</script>
</body>
</html>
